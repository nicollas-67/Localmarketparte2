<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="round">
        <img src="https://static.vecteezy.com/ti/vetor-gratis/p1/6607545-pedra-logo-modelo-em-fundo-branco-gratis-vetor.jpg" width="300">
        </div>

        <div class="wrap-input-label">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Insira o Usuário">
        </div>
    <div class="wrap-input-label">
        <label for="senha">senha</label>
        <input type="password" id="senha" placeholder="Insira sua senha">
        <div onclick="showPassword()">
            <img src="../../public/view.png" alt="senha" class="eye" id="eye" width="25px">
        </div>
    </div>
</div>
        <button class="btn-login" onclick="login()">Login</button>
        <div class="error-div" id="error-modal">
            <h3>Credenciais incorretas!</h3>
            <button onclick="fecharError()">❌</button>
        </div>

        <script src="script.js"></script>
    
</body>
</html>
